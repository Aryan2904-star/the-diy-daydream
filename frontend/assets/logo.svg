<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The DIY Daydream logo badge">
  <defs>
    <radialGradient id="badgeGlow" cx="50%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#d8c8ea"/>
      <stop offset="60%" stop-color="#c4b0d8"/>
      <stop offset="100%" stop-color="#a98cc4"/>
    </radialGradient>
    <linearGradient id="frameGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0a3b3"/>
      <stop offset="100%" stop-color="#c4798c"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#4a2860" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- outer medallion shadow -->
  <circle cx="120" cy="124" r="110" fill="#4a2860" opacity="0.18"/>
  <!-- gold rim -->
  <circle cx="120" cy="120" r="110" fill="#c8a84b"/>
  <!-- rose ornamental frame -->
  <circle cx="120" cy="120" r="104" fill="url(#frameGrad)"/>
  <!-- scalloped dots around frame -->
  <g fill="#fdf4e0" opacity="0.9">
    <!-- generated ring of small dots -->
    <circle cx="120" cy="24" r="3.4"/>
    <circle cx="153" cy="29.6" r="3.4"/>
    <circle cx="181.4" cy="46.3" r="3.4"/>
    <circle cx="201.9" cy="71.6" r="3.4"/>
    <circle cx="212.4" cy="102.4" r="3.4"/>
    <circle cx="212.4" cy="137.6" r="3.4"/>
    <circle cx="201.9" cy="168.4" r="3.4"/>
    <circle cx="181.4" cy="193.7" r="3.4"/>
    <circle cx="153" cy="210.4" r="3.4"/>
    <circle cx="120" cy="216" r="3.4"/>
    <circle cx="87" cy="210.4" r="3.4"/>
    <circle cx="58.6" cy="193.7" r="3.4"/>
    <circle cx="38.1" cy="168.4" r="3.4"/>
    <circle cx="27.6" cy="137.6" r="3.4"/>
    <circle cx="27.6" cy="102.4" r="3.4"/>
    <circle cx="38.1" cy="71.6" r="3.4"/>
    <circle cx="58.6" cy="46.3" r="3.4"/>
    <circle cx="87" cy="29.6" r="3.4"/>
  </g>
  <!-- inner lavender face -->
  <circle cx="120" cy="120" r="88" fill="url(#badgeGlow)"/>
  <circle cx="120" cy="120" r="88" fill="none" stroke="#ffffff" stroke-opacity="0.45" stroke-width="2"/>
  <!-- inner shadow ring for depth -->
  <circle cx="120" cy="122" r="84" fill="none" stroke="#4a2860" stroke-opacity="0.12" stroke-width="6"/>

  <!-- gold stars -->
  <g fill="#f3d56b">
    <path filter="url(#soft)" d="M70 70 l3 7 7 3 -7 3 -3 7 -3-7 -7-3 7-3z"/>
    <path d="M176 88 l2.4 5.6 5.6 2.4 -5.6 2.4 -2.4 5.6 -2.4-5.6 -5.6-2.4 5.6-2.4z"/>
    <path d="M64 150 l2 4.8 4.8 2 -4.8 2 -2 4.8 -2-4.8 -4.8-2 4.8-2z"/>
    <path d="M170 158 l2.6 6 6 2.6 -6 2.6 -2.6 6 -2.6-6 -6-2.6 6-2.6z"/>
  </g>

  <!-- wordmark -->
  <text x="120" y="112" text-anchor="middle" font-family="Poppins, sans-serif" font-size="14" letter-spacing="3" fill="#3a2050">THE</text>
  <text x="120" y="135" text-anchor="middle" font-family="Poppins, sans-serif" font-weight="800" font-size="26" letter-spacing="1" fill="#2b1640">DIY</text>
  <text x="120" y="166" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="30" fill="#7a3a55">Daydream</text>

  <!-- butterflies -->
  <g filter="url(#soft)">
    <g transform="translate(34,120) scale(0.9)">
      <path d="M0 0 C-14 -16 -30 -14 -28 4 C-26 16 -10 18 0 6 Z" fill="#fffefb" stroke="#c8a84b" stroke-width="1.4"/>
      <path d="M0 0 C-12 12 -26 14 -24 0 C-22 -10 -8 -10 0 -2 Z" fill="#fdf4e0" stroke="#c8a84b" stroke-width="1.2"/>
      <line x1="0" y1="-4" x2="0" y2="8" stroke="#8a6a2a" stroke-width="2"/>
    </g>
    <g transform="translate(206,120) scale(-0.9,0.9)">
      <path d="M0 0 C-14 -16 -30 -14 -28 4 C-26 16 -10 18 0 6 Z" fill="#fffefb" stroke="#c8a84b" stroke-width="1.4"/>
      <path d="M0 0 C-12 12 -26 14 -24 0 C-22 -10 -8 -10 0 -2 Z" fill="#fdf4e0" stroke="#c8a84b" stroke-width="1.2"/>
      <line x1="0" y1="-4" x2="0" y2="8" stroke="#8a6a2a" stroke-width="2"/>
    </g>
  </g>
</svg>
